name: E2E

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        # `prod` temporarily disabled. Restore by uncommenting the entry below
        # and the corresponding env file (env/prod.ts) + index.ts plumbing.
        options: [pre-dev, dev, stage, qa] # , prod
        default: dev
      suite:
        description: 'Suite to run — "all" or any spec basename without .spec.ts (e.g. login, orgs). Dashboard sources values from test-catalog.json.'
        required: true
        type: string
        default: all
      browser:
        description: Project to run
        required: true
        type: choice
        options: [chromium, mobile-chromium, both]
        default: chromium
      grep:
        description: Optional Playwright --grep filter (test title regex). Leave blank to run the whole suite.
        required: false
        type: string
        default: ''
      parent_run_id:
        description: If set, merge this run's results into an existing dashboard run (re-run flow). Leave blank for a standalone run.
        required: false
        type: string
        default: ''

concurrency:
  group: e2e-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  e2e:
    name: ${{ inputs.environment }} · ${{ inputs.suite }}${{ inputs.grep && format(' · {0}', inputs.grep) || '' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 30

    defaults:
      run:
        working-directory: playwright

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Validate environment secrets
        env:
          XT_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          XT_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: |
          if [ -z "$XT_USER_EMAIL" ] || [ -z "$XT_USER_PASSWORD" ]; then
            echo "::error::Environment '${{ inputs.environment }}' is missing TEST_USER_EMAIL or TEST_USER_PASSWORD secret. Add them under Settings → Environments → ${{ inputs.environment }}."
            exit 1
          fi
          echo "Secrets OK for ${{ inputs.environment }} (user starts with: ${XT_USER_EMAIL:0:4}…)"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Resolve filters
        id: filters
        run: |
          case "${{ inputs.browser }}" in
            both) echo "project=" >> "$GITHUB_OUTPUT" ;;
            *)    echo "project=--project=${{ inputs.browser }}" >> "$GITHUB_OUTPUT" ;;
          esac
          case "${{ inputs.suite }}" in
            all) echo "suite=" >> "$GITHUB_OUTPUT" ;;
            *)   echo "suite=tests/${{ inputs.suite }}.spec.ts" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright
        env:
          XT_ENV: ${{ inputs.environment }}
          XT_SUITE: ${{ inputs.suite }}
          XT_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          XT_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          XT_TOTP_SECRET: ${{ secrets.TEST_TOTP_SECRET }}
          GREP_INPUT: ${{ inputs.grep }}
          # When parent_run_id is set, the reporter uses this as runId so
          # attachments and JSON land under the parent's namespace.
          XT_RESULT_RUN_ID: ${{ inputs.parent_run_id }}
          XT_RUN_DESTRUCTIVE: ${{ inputs.grep == 'TC-PF-006' && '1' || '0' }}
        run: |
          GREP_FLAG=""
          if [ -n "$GREP_INPUT" ]; then
            GREP_FLAG="--grep=$GREP_INPUT"
            echo "Running with grep filter: $GREP_INPUT"
          fi
          pnpm exec playwright test ${{ steps.filters.outputs.project }} ${{ steps.filters.outputs.suite }} $GREP_FLAG
        continue-on-error: true
        id: run-tests

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright/playwright-report/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload raw test-results (videos, traces, screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: playwright/test-results/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload run.json
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-json-${{ github.run_id }}
          path: playwright/.results/run.json
          retention-days: 30
          if-no-files-found: warn

      - name: Sanity-check run.json + attachments
        if: always()
        run: |
          if [ ! -f .results/run.json ]; then
            echo "::error::JSON reporter did not emit playwright/.results/run.json — Playwright likely crashed before any test ran."
            exit 1
          fi
          echo "==== run.json stats ===="
          jq '.stats' .results/run.json
          echo "==== attachments referenced in JSON ===="
          jq '[.tests[].attachments[].url]' .results/run.json
          echo "==== attachments staged on disk ===="
          if [ -d .results/attachments ]; then
            find .results/attachments -type f -printf '%P\t%s bytes\n' | sort
          else
            echo "(no attachments dir)"
          fi

      - name: Sync results branch (clone or initialize)
        if: always()
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          rm -rf results-branch
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"

          # Try to clone the existing results branch shallowly. If it doesn't
          # exist, create an orphan branch in a fresh dir.
          if git ls-remote --exit-code --heads "$REMOTE" results > /dev/null 2>&1; then
            echo "results branch exists — cloning"
            git clone --depth 1 --branch results "$REMOTE" results-branch
          else
            echo "results branch does not exist — creating orphan"
            mkdir results-branch
            cd results-branch
            git init -q -b results
            git remote add origin "$REMOTE"
            mkdir -p runs
            echo '{"runs": []}' > index.json
          fi

      - name: Append run.json + attachments + update index.json
        if: always()
        working-directory: ${{ github.workspace }}/results-branch
        env:
          ACTIONS_RUN_ID: ${{ github.run_id }}
          PARENT_RUN_ID: ${{ inputs.parent_run_id }}
        run: |
          set -e
          mkdir -p runs

          # The reporter has already written a JSON whose runId is either
          # GITHUB_RUN_ID (fresh run) or PARENT_RUN_ID (re-run merge).
          NEW_JSON="../playwright/.results/run.json"
          REPORTED_RUN_ID=$(jq -r '.runId' "$NEW_JSON")
          echo "Reporter wrote runId=${REPORTED_RUN_ID} (actionsRunId=${ACTIONS_RUN_ID}, parent=${PARENT_RUN_ID:-<none>})"

          if [ -n "$PARENT_RUN_ID" ] && [ -f "runs/${PARENT_RUN_ID}.json" ]; then
            echo "==== Re-run flow — merging ${ACTIONS_RUN_ID} into parent ${PARENT_RUN_ID} ===="
            # Replace tests with matching (id, project) keys; append any new ones.
            # Recompute stats. Bump finishedAt + durationMs to the new run's.
            jq --slurpfile new "$NEW_JSON" '
              . as $parent
              | $new[0] as $n
              | .tests = (
                  ($parent.tests
                    | map(
                        . as $t
                        | (
                            $n.tests
                            | map(select(.id == $t.id and .project == $t.project))
                            | .[0]
                          ) // $t
                      ))
                  + (
                    $n.tests
                    | map(
                        . as $newT
                        | select(
                            ($parent.tests
                              | map(.id + "::" + .project)
                              | index($newT.id + "::" + $newT.project)) == null
                          )
                      )
                  )
                )
              | .stats = (
                  .tests
                  | {
                      total: length,
                      passed: (map(select(.status == "passed")) | length),
                      failed: (map(select(.status == "failed" or .status == "timedOut")) | length),
                      skipped: (map(select(.status == "skipped")) | length),
                      flaky: (map(select(.retries > 0 and .status == "passed")) | length)
                    }
                )
              | .finishedAt = $n.finishedAt
              | .durationMs = $n.durationMs
              | .commit = ($n.commit // .commit)
              | .workflowRunUrl = $n.workflowRunUrl
              | .lineage = ((.lineage // []) + [{actionsRunId: $n.actionsRunId, finishedAt: $n.finishedAt, workflowRunUrl: $n.workflowRunUrl, grep: env.GREP_INPUT}])
            ' "runs/${PARENT_RUN_ID}.json" > "runs/${PARENT_RUN_ID}.json.tmp" && mv "runs/${PARENT_RUN_ID}.json.tmp" "runs/${PARENT_RUN_ID}.json"

            # Merge attachments under parent's dir (reporter already wrote them
            # under XT_RESULT_RUN_ID = PARENT_RUN_ID, so this is just a copy).
            if [ -d "../playwright/.results/attachments/${PARENT_RUN_ID}" ]; then
              mkdir -p "runs/${PARENT_RUN_ID}"
              cp -R "../playwright/.results/attachments/${PARENT_RUN_ID}/." "runs/${PARENT_RUN_ID}/"
            fi

            # Upsert index entry with refreshed stats. Move to top.
            jq --slurpfile r "runs/${PARENT_RUN_ID}.json" '
              .runs = (
                [{
                  runId:          $r[0].runId,
                  workflowRunUrl: $r[0].workflowRunUrl,
                  commit:         $r[0].commit,
                  environment:    $r[0].environment,
                  suite:          $r[0].suite,
                  startedAt:      $r[0].startedAt,
                  finishedAt:     $r[0].finishedAt,
                  durationMs:     $r[0].durationMs,
                  stats:          $r[0].stats
                }]
                + (.runs | map(select(.runId != $r[0].runId)))
              ) | .runs = (.runs | .[0:1000])
            ' index.json > index.json.tmp && mv index.json.tmp index.json
            echo "Merged into parent ${PARENT_RUN_ID}. index.json has $(jq '.runs | length' index.json) entries."
          else
            if [ -n "$PARENT_RUN_ID" ]; then
              echo "::warning::parent_run_id=${PARENT_RUN_ID} requested but runs/${PARENT_RUN_ID}.json not found on results branch — falling back to standalone run."
            fi

            FRESH_ID="${REPORTED_RUN_ID}"
            cp "$NEW_JSON" "runs/${FRESH_ID}.json"
            if [ -d "../playwright/.results/attachments/${FRESH_ID}" ]; then
              mkdir -p "runs/${FRESH_ID}"
              cp -R "../playwright/.results/attachments/${FRESH_ID}/." "runs/${FRESH_ID}/"
              echo "Copied $(ls runs/${FRESH_ID} | wc -l) attachment(s) for run ${FRESH_ID}"
            else
              echo "No attachments staged for run ${FRESH_ID}"
            fi
            if [ ! -f index.json ]; then
              echo '{"runs": []}' > index.json
            fi
            jq --slurpfile r "runs/${FRESH_ID}.json" '
              .runs = ([{
                runId:          $r[0].runId,
                workflowRunUrl: $r[0].workflowRunUrl,
                commit:         $r[0].commit,
                environment:    $r[0].environment,
                suite:          $r[0].suite,
                startedAt:      $r[0].startedAt,
                finishedAt:     $r[0].finishedAt,
                durationMs:     $r[0].durationMs,
                stats:          $r[0].stats
              }] + .runs) | .runs = (.runs | .[0:1000])
            ' index.json > index.json.tmp && mv index.json.tmp index.json
            echo "index.json now has $(jq '.runs | length' index.json) entries"
          fi

      - name: Commit + push to results branch
        if: always()
        working-directory: ${{ github.workspace }}/results-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ACTIONS_RUN_ID: ${{ github.run_id }}
          PARENT_RUN_ID: ${{ inputs.parent_run_id }}
        run: |
          set -e
          git config user.name  "xitester-test bot"
          git config user.email "actions@github.com"

          # Stage everything relevant: JSONs, attachment dirs, and the index.
          git add index.json
          git add runs/ 2>/dev/null || true

          echo "==== git status before commit ===="
          git status --short
          echo "==== files staged ===="
          git diff --cached --name-only
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi

          if [ -n "$PARENT_RUN_ID" ]; then
            MSG="results: re-run ${{ inputs.environment }} ${{ inputs.suite }} into parent ${PARENT_RUN_ID} (actions ${ACTIONS_RUN_ID})"
          else
            MSG="results: ${{ inputs.environment }} ${{ inputs.suite }} run ${ACTIONS_RUN_ID}"
          fi
          git commit -m "$MSG"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          git push origin HEAD:results
          echo "==== Pushed. Verifying ===="
          TARGET="${PARENT_RUN_ID:-$ACTIONS_RUN_ID}"
          if [ -d "runs/${TARGET}" ]; then
            echo "Files under runs/${TARGET}:"
            ls -la "runs/${TARGET}/"
          fi

      - name: Propagate test failure
        if: steps.run-tests.outcome == 'failure'
        run: |
          echo "::error::Playwright reported failures — see the uploaded HTML report and the dashboard."
          exit 1
