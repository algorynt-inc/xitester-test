name: E2E

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, stage, qa, prod]
        default: dev
      suite:
        description: Suite to run
        required: true
        type: choice
        options: [all, login, signup]
        default: all
      browser:
        description: Project to run
        required: true
        type: choice
        options: [chromium, mobile-chromium, both]
        default: chromium
      grep:
        description: Optional Playwright --grep filter (test title regex). Leave blank to run the whole suite.
        required: false
        type: string
        default: ''

concurrency:
  group: e2e-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  e2e:
    name: ${{ inputs.environment }} · ${{ inputs.suite }}${{ inputs.grep && format(' · {0}', inputs.grep) || '' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 30

    defaults:
      run:
        working-directory: playwright

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Validate environment secrets
        env:
          XT_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          XT_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: |
          if [ -z "$XT_USER_EMAIL" ] || [ -z "$XT_USER_PASSWORD" ]; then
            echo "::error::Environment '${{ inputs.environment }}' is missing TEST_USER_EMAIL or TEST_USER_PASSWORD secret. Add them under Settings → Environments → ${{ inputs.environment }}."
            exit 1
          fi
          echo "Secrets OK for ${{ inputs.environment }} (user starts with: ${XT_USER_EMAIL:0:4}…)"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Resolve filters
        id: filters
        run: |
          case "${{ inputs.browser }}" in
            both) echo "project=" >> "$GITHUB_OUTPUT" ;;
            *)    echo "project=--project=${{ inputs.browser }}" >> "$GITHUB_OUTPUT" ;;
          esac
          case "${{ inputs.suite }}" in
            all) echo "suite=" >> "$GITHUB_OUTPUT" ;;
            *)   echo "suite=tests/${{ inputs.suite }}.spec.ts" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright
        env:
          XT_ENV: ${{ inputs.environment }}
          XT_SUITE: ${{ inputs.suite }}
          XT_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          XT_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          XT_TOTP_SECRET: ${{ secrets.TEST_TOTP_SECRET }}
          GREP_INPUT: ${{ inputs.grep }}
        run: |
          GREP_FLAG=""
          if [ -n "$GREP_INPUT" ]; then
            GREP_FLAG="--grep=$GREP_INPUT"
            echo "Running with grep filter: $GREP_INPUT"
          fi
          pnpm exec playwright test ${{ steps.filters.outputs.project }} ${{ steps.filters.outputs.suite }} $GREP_FLAG
        continue-on-error: true
        id: run-tests

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright/playwright-report/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload raw test-results (videos, traces, screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: playwright/test-results/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload run.json
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-json-${{ github.run_id }}
          path: playwright/.results/run.json
          retention-days: 30
          if-no-files-found: warn

      - name: Sanity-check run.json + attachments
        if: always()
        run: |
          if [ ! -f .results/run.json ]; then
            echo "::error::JSON reporter did not emit playwright/.results/run.json — Playwright likely crashed before any test ran."
            exit 1
          fi
          echo "==== run.json stats ===="
          jq '.stats' .results/run.json
          echo "==== attachments referenced in JSON ===="
          jq '[.tests[].attachments[].url]' .results/run.json
          echo "==== attachments staged on disk ===="
          if [ -d .results/attachments ]; then
            find .results/attachments -type f -printf '%P\t%s bytes\n' | sort
          else
            echo "(no attachments dir)"
          fi

      - name: Sync results branch (clone or initialize)
        if: always()
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          rm -rf results-branch
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"

          # Try to clone the existing results branch shallowly. If it doesn't
          # exist, create an orphan branch in a fresh dir.
          if git ls-remote --exit-code --heads "$REMOTE" results > /dev/null 2>&1; then
            echo "results branch exists — cloning"
            git clone --depth 1 --branch results "$REMOTE" results-branch
          else
            echo "results branch does not exist — creating orphan"
            mkdir results-branch
            cd results-branch
            git init -q -b results
            git remote add origin "$REMOTE"
            mkdir -p runs
            echo '{"runs": []}' > index.json
          fi

      - name: Append run.json + attachments + update index.json
        if: always()
        working-directory: ${{ github.workspace }}/results-branch
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          set -e
          mkdir -p runs
          cp "../playwright/.results/run.json" "runs/${RUN_ID}.json"
          # Copy any attachments the reporter staged (screenshots, videos, traces).
          if [ -d "../playwright/.results/attachments/${RUN_ID}" ]; then
            mkdir -p "runs/${RUN_ID}"
            cp -R "../playwright/.results/attachments/${RUN_ID}/." "runs/${RUN_ID}/"
            echo "Copied $(ls runs/${RUN_ID} | wc -l) attachment(s) for run ${RUN_ID}"
          else
            echo "No attachments staged for run ${RUN_ID}"
          fi
          if [ ! -f index.json ]; then
            echo '{"runs": []}' > index.json
          fi
          jq --slurpfile r "runs/${RUN_ID}.json" '
            .runs = ([{
              runId:          $r[0].runId,
              workflowRunUrl: $r[0].workflowRunUrl,
              commit:         $r[0].commit,
              environment:    $r[0].environment,
              suite:          $r[0].suite,
              startedAt:      $r[0].startedAt,
              finishedAt:     $r[0].finishedAt,
              durationMs:     $r[0].durationMs,
              stats:          $r[0].stats
            }] + .runs) | .runs = (.runs | .[0:1000])
          ' index.json > index.json.tmp && mv index.json.tmp index.json
          echo "index.json now has $(jq '.runs | length' index.json) entries"

      - name: Commit + push to results branch
        if: always()
        working-directory: ${{ github.workspace }}/results-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -e
          git config user.name  "xitester-test bot"
          git config user.email "actions@github.com"
          git add "runs/${RUN_ID}.json" index.json
          if [ -d "runs/${RUN_ID}" ]; then
            git add "runs/${RUN_ID}"
          fi
          echo "==== git status before commit ===="
          git status --short
          echo "==== files staged ===="
          git diff --cached --name-only
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "results: ${{ inputs.environment }} ${{ inputs.suite }} run ${RUN_ID}"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          git push origin HEAD:results
          echo "==== Pushed. Verifying remote contents ===="
          if [ -d "runs/${RUN_ID}" ]; then
            echo "Files committed under runs/${RUN_ID}:"
            ls -la "runs/${RUN_ID}/"
          fi

      - name: Propagate test failure
        if: steps.run-tests.outcome == 'failure'
        run: |
          echo "::error::Playwright reported failures — see the uploaded HTML report and the dashboard."
          exit 1
