name: Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'playwright/**'
      - 'test-cases/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install playwright deps (for --list)
        working-directory: playwright
        run: pnpm install --no-frozen-lockfile

      - name: Generate static test catalog
        working-directory: playwright
        run: |
          # `playwright test --list --reporter=json` enumerates every test
          # without launching a browser. Capture into web/public so Vite
          # ships it as a static asset under /xitester-test/test-catalog.json.
          mkdir -p ../web/public
          XT_ENV=local pnpm exec playwright test --list --reporter=json > ../web/public/test-catalog.json || {
            echo "::warning::playwright --list failed; shipping empty catalog"
            echo '{"suites":[]}' > ../web/public/test-catalog.json
          }
          echo "Catalog summary:"
          jq '{
            suites: (.suites | length),
            total_specs: ([.. | objects | select(.specs?) | .specs | length] | add // 0)
          }' ../web/public/test-catalog.json || true

      - name: Install web deps
        working-directory: web
        run: pnpm install --no-frozen-lockfile

      - name: Build web
        working-directory: web
        run: pnpm build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
