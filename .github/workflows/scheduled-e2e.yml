name: Scheduled E2E

# Config-driven scheduler. GitHub fires this on a best-effort 10-minute cron —
# in practice ticks on quiet repos are throttled and can arrive an hour or
# more apart. Each tick therefore computes the window since the PREVIOUS tick
# and dispatches e2e.yml for every enabled environment whose daily utcTime
# fell inside that window: a late tick fires the run late instead of skipping
# it. Toggling an env on/off or changing its time only requires editing
# schedule-config.json (the dashboard Schedules page does this) — never this
# file.

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: # manual tick — evaluates the same catch-up window as a cron tick

permissions:
  contents: read
  actions: write # needed to create workflow_dispatch events on e2e.yml (includes read for run lookups)

concurrency:
  group: scheduled-e2e
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout schedule config
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            schedule-config.json
          sparse-checkout-cone-mode: false

      - name: Dispatch e2e.yml for schedules due since the previous tick
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -e
          # Window end = this run's own created_at (not "now"): consecutive
          # ticks then form non-overlapping (prev.created_at, this.created_at]
          # windows even when their executions are delayed or queued out of
          # order by the concurrency group.
          CUR=$(gh api "repos/$REPO/actions/runs/$RUN_ID" --jq .created_at)
          PREV=$(gh api "repos/$REPO/actions/workflows/scheduled-e2e.yml/runs?per_page=50" \
            --jq '[.workflow_runs[] | select((.id | tostring) != env.RUN_ID) | .created_at | select(. < "'"$CUR"'")] | max // empty')

          CUR_S=$(date -u -d "$CUR" +%s)
          if [ -n "$PREV" ]; then
            PREV_S=$(date -u -d "$PREV" +%s)
          else
            # First tick ever — look back 30 minutes.
            PREV_S=$(( CUR_S - 1800 ))
          fi
          # Cap catch-up at 24h so a long outage fires at most one day's run.
          if [ $(( CUR_S - PREV_S )) -gt 86400 ]; then
            PREV_S=$(( CUR_S - 86400 ))
          fi
          echo "Window: ($(date -u -d "@$PREV_S" +%FT%TZ), $(date -u -d "@$CUR_S" +%FT%TZ)]"

          DISPATCHED=0
          while IFS=$'\t' read -r env time suite browser; do
            # Most recent daily occurrence of $time at-or-before the window
            # end: today's, or yesterday's if today's is still ahead.
            T=$(date -u -d "$(date -u -d "@$CUR_S" +%F) $time" +%s)
            if [ "$T" -gt "$CUR_S" ]; then T=$(( T - 86400 )); fi

            if [ "$T" -gt "$PREV_S" ]; then
              echo "→ $env: $time UTC fell inside the window — dispatching (suite=$suite browser=$browser)"
              gh workflow run e2e.yml --ref main \
                -f environment="$env" \
                -f suite="$suite" \
                -f browser="$browser" \
                -f grep= \
                -f parent_run_id=
              DISPATCHED=$(( DISPATCHED + 1 ))
            else
              echo "  $env: $time UTC not in window — skipping"
            fi
          done < <(jq -r '
            .schedules | to_entries[]
            | select(.value.enabled == true)
            | [.key, .value.utcTime, (.value.suite // "all"), (.value.browser // "chromium")]
            | @tsv
          ' schedule-config.json)

          echo "Dispatched $DISPATCHED run(s)."
